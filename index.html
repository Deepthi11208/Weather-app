<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="app">
    <div class="header">
      <h1 class="title">WEATHER</h1>
      <p class="subtitle">Real-time forecast</p>
    </div>

    <div class="search-box">
      <input type="text" id="city" placeholder="Search city..." onkeydown="if(event.key==='Enter') getWeather()">
      <button onclick="getWeather()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <div class="weather-card" id="result">
      <div class="placeholder">
        <div class="placeholder-icon">🌍</div>
        <p>Search a city to see<br>live weather data</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
